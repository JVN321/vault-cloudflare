name = "vault-cloudflare"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Pages project – static assets are served from ./dist
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "vault-db"
database_id = "41650513-f46a-4a3e-8ffc-e8bd6b14161d"
migrations_dir = "drizzle/migrations-local"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "vault-db"
database_id = "41650513-f46a-4a3e-8ffc-e8bd6b14161d"
migrations_dir = "drizzle/migrations-remote"

[vars]
ENVIRONMENT = "development"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put <NAME>`)
# ---------------------------------------------------------------------------
# SESSION_SECRET            – 32-byte random string for cookie signing
# CAMERA_API_KEY            – shared secret between ESP32 and the Worker
# ADMIN_EMAIL               – e.g. admin@yourdomain.com  (enables env-admin login)
# ADMIN_PASSWORD            – strong passphrase for the dashboard admin account
# SUPABASE_URL              – URL for Supabase storage bucket
# SUPABASE_SECRET_KEY       – Supabase Secret Key for backend access
# ---------------------------------------------------------------------------


[dev]
port = 8788
local_protocol = "http"
